<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>For Reza ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:black;
overflow-x:hidden;
color:white;
}

/* OPENING */

.opening{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
background:black;
}

.hearts{
position:absolute;
inset:0;
overflow:hidden;
}

.heart{
position:absolute;
top:-10%;
color:#ff2d75;
opacity:.7;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:
translateY(-10vh)
rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:
translateY(120vh)
rotate(360deg);
opacity:0;
}

}

.center{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

.center h1{
font-size:30px;
font-weight:700;
opacity:0;
animation:fade 2s ease forwards;
animation-delay:2s;
}

@keyframes fade{

to{
opacity:1;
}

}

.start-btn{
margin-top:35px;
width:82px;
height:82px;
border-radius:50%;
border:none;
background:#ff2d75;
color:white;
font-size:32px;
cursor:pointer;

opacity:0;
pointer-events:none;

transition:.4s;

box-shadow:
0 0 25px #ff2d75,
0 0 70px rgba(255,45,117,.5);
}

.start-btn.show{
opacity:1;
pointer-events:auto;
}

/* SPOTIFY */

.spotify{
min-height:100vh;
padding:20px 20px 120px;
position:relative;
}

.bg{
position:fixed;
inset:0;
z-index:-1;
}

.bg img{
width:100%;
height:100%;
object-fit:cover;

filter:
grayscale(1)
blur(45px)
brightness(.22);

transform:scale(1.2);
}

.top{
text-align:center;
margin-top:10px;
}

.top small{
color:#aaa;
font-size:11px;
}

.top h2{
margin-top:6px;
font-size:17px;
font-weight:600;
}

.preview{
margin-top:35px;
font-size:14px;
line-height:28px;
font-weight:600;
}

/* ALBUM */

.album{
margin-top:35px;
width:100%;
height:400px;
border-radius:28px;
overflow:hidden;
position:relative;

transition:
transform .4s ease;

box-shadow:
0 0 40px rgba(255,255,255,.08);
}

.album:active{
transform:scale(.98);
}

.album img{
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(1);

transition:
opacity .45s ease,
transform .45s ease;
}

.overlay{
position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.88),
rgba(0,0,0,.15)
);

display:flex;
justify-content:flex-end;
flex-direction:column;

padding:24px;

opacity:0;
transition:.4s;
}

.album.active .overlay{
opacity:1;
}

.overlay h3{
font-size:18px;
margin-bottom:8px;
font-weight:600;
}

.overlay p{
font-size:12px;
line-height:22px;
color:#ddd;
}

/* SONG */

.song{
margin-top:28px;
}

.song h1{
font-size:21px;
font-weight:700;
}

.song p{
font-size:13px;
margin-top:4px;
color:#bbb;
}

/* PROGRESS */

.progress{
margin-top:28px;
}

.bar{
width:100%;
height:4px;
background:#555;
border-radius:20px;
overflow:hidden;
cursor:pointer;
}

.fill{
width:0%;
height:100%;
background:white;

transition:width .15s linear;
}

.time{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:11px;
color:#aaa;
}

/* CONTROLS */

.controls{
margin-top:32px;
display:flex;
justify-content:center;
align-items:center;
gap:32px;
}

.controls button{
border:none;
background:none;
color:white;
cursor:pointer;
}

.icon{
font-size:28px;
}

.play-btn{
width:82px;
height:82px;
border-radius:50%;
background:white !important;
color:black !important;
font-size:34px;
}

/* LYRICS */

.lyrics{
margin-top:55px;
background:#171717;
border-radius:30px;
padding:28px;
}

.lyrics h2{
font-size:18px;
margin-bottom:22px;
}

.preview-line{
font-size:14px;
line-height:30px;
color:#ddd;
}

.show-btn{
margin-top:26px;
border:none;
background:white;
color:black;
padding:12px 20px;
border-radius:999px;
font-weight:600;
cursor:pointer;
}

.full-lyrics{
position:fixed;
inset:0;

background:
rgba(0,0,0,.82);

backdrop-filter:blur(18px);

padding:35px;

opacity:0;
pointer-events:none;

transition:.5s;

z-index:999;
}

.full-lyrics.show{
opacity:1;
pointer-events:auto;
}

.lyric-box{
width:100%;
max-width:550px;
margin:auto;

height:100%;
overflow:auto;

padding-top:60px;
padding-bottom:120px;
}

.lyric-line{

font-size:18px;
line-height:45px;
font-weight:600;

text-align:left;

opacity:0;

transform:
translateY(12px);

animation:
lineFade .5s ease forwards;

}

@keyframes lineFade{

to{
opacity:1;
transform:translateY(0);
}

}

.close-btn{
position:absolute;
top:25px;
right:25px;

width:45px;
height:45px;

border:none;
border-radius:50%;

background:white;
color:black;

font-size:22px;
font-weight:bold;

cursor:pointer;
}

/* ARTIST */

.artist{
margin-top:40px;
background:#171717;
border-radius:28px;
overflow:hidden;
}

.artist img{
width:100%;
height:220px;
object-fit:cover;
filter:grayscale(1);
}

.artist-content{
padding:24px;
}

.artist-content small{
font-size:11px;
color:#999;
}

.artist-content h2{
margin-top:8px;
font-size:22px;
}

.artist-content p{
margin-top:12px;
font-size:13px;
line-height:24px;
color:#ccc;
}

/* CREDIT */

.credit{
margin-top:35px;
background:#171717;
border-radius:28px;
padding:28px;
}

.credit h2{
font-size:22px;
margin-bottom:22px;
}

.credit-item{
margin-bottom:20px;
}

.credit-item h3{
font-size:16px;
}

.credit-item p{
font-size:13px;
margin-top:5px;
color:#999;
}

</style>
</head>

<body>

<audio id="audio">
<source src="" type="audio/mp3">
</audio>

<section class="opening">

<div class="hearts"
id="hearts"></div>

<div class="center">

<h1 id="openingText"></h1>

<button class="start-btn"
id="startBtn">

❤

</button>

</div>

</section>

<section class="spotify"
id="spotify">

<div class="bg">
<img id="bgImage">
</div>

<div class="top">

<small>
MEMAINKAN DARI PLAYLIST
</small>

<h2 id="playlistName"></h2>

</div>

 <div class="preview"
id="previewLyric"></div>

<div class="album"
id="album">

<img id="albumImage">

<div class="overlay">

<h3 id="photoTitle"></h3>

<p id="photoDesc"></p>

</div>

</div>

<div class="song">

<h1 id="songTitle"></h1>

<p id="songArtist"></p>

</div>

<div class="progress">

<div class="bar">

<div class="fill"
id="fill"></div>

</div>

<div class="time">

<span id="current">
0:00
</span>

<span id="duration">
0:00
</span>

</div>

</div>

<div class="controls">

<button class="icon"
id="prevBtn">
⏮
</button>

<button class="play-btn"
id="playBtn">
▶
</button>

<button class="icon"
id="nextBtn">
⏭
</button>

</div>

<div class="lyrics">

<h2>
Pratinjau lirik
</h2>

<div class="preview-line"
id="previewLine"></div>

<button class="show-btn"
id="showLyrics">

Tampilkan lirik

</button>

</div>

<div class="artist">

<img id="artistImage">

<div class="artist-content">

<small>
#playlist favorit
</small>

<h2 id="artistName"></h2>

<p id="artistDesc"></p>

</div>

</div>

<div class="credit">

<h2>
Kredit
</h2>

<div class="credit-item">

<h3 id="credit1"></h3>

<p id="credit1desc"></p>

</div>

<div class="credit-item">

<h3 id="credit2"></h3>

<p id="credit2desc"></p>

</div>

</div>

</section>

<div class="full-lyrics"
id="fullLyrics">

<button class="close-btn"
id="closeLyrics">
×
</button>

<div class="lyric-box"
id="lyricBox"></div>

</div>

<script>

/* DATA */

document.querySelector(
"audio source"
).src = SONG_URL;

document.getElementById(
"songTitle"
).innerHTML = SONG_TITLE;

document.getElementById(
"songArtist"
).innerHTML = SONG_ARTIST;

document.getElementById(
"playlistName"
).innerHTML = PLAYLIST_NAME;

document.getElementById(
"openingText"
).innerHTML = OPENING_TEXT;

document.getElementById(
"previewLine"
).innerHTML = PREVIEW_LYRIC;

document.getElementById(
"artistName"
).innerHTML = ARTIST_NAME;

document.getElementById(
"artistDesc"
).innerHTML = ARTIST_DESC;

document.getElementById(
"credit1"
).innerHTML = CREDIT_1;

document.getElementById(
"credit1desc"
).innerHTML = CREDIT_1_DESC;

document.getElementById(
"credit2"
).innerHTML = CREDIT_2;

document.getElementById(
"credit2desc"
).innerHTML = CREDIT_2_DESC;

/* HEART */

const hearts =
document.getElementById(
"hearts"
);

for(let i=0;i<45;i++){

const heart =
document.createElement("div");

heart.classList.add(
"heart"
);

heart.innerHTML = "❤";

heart.style.left =
Math.random()*100+"vw";

heart.style.fontSize =
(Math.random()*18+12)
+"px";

heart.style.animationDuration =
(Math.random()*5+6)
+"s";

heart.style.animationDelay =
Math.random()*5+"s";

hearts.appendChild(
heart
);

}

/* BUTTON */

const startBtn =
document.getElementById(
"startBtn"
);

setTimeout(()=>{

startBtn.classList.add(
"show"
);

},4500);

startBtn.addEventListener(
"click",()=>{

document.getElementById(
"spotify"
).scrollIntoView({

behavior:"smooth"

});

});

/* PHOTO */

let currentPhoto = 0;

const albumImage =
document.getElementById(
"albumImage"
);

const bgImage =
document.getElementById(
"bgImage"
);

const photoTitle =
document.getElementById(
"photoTitle"
);

const photoDesc =
document.getElementById(
"photoDesc"
);

const artistImage =
document.getElementById(
"artistImage"
);

function updatePhoto(){

albumImage.style.opacity = "0";

albumImage.style.transform =
"translateX(15px)";

setTimeout(()=>{

albumImage.src =
photos[currentPhoto].img;

bgImage.src =
photos[currentPhoto].img;

artistImage.src =
photos[currentPhoto].img;

photoTitle.innerHTML =
photos[currentPhoto].title;

photoDesc.innerHTML =
photos[currentPhoto].desc;

albumImage.style.opacity = "1";

albumImage.style.transform =
"translateX(0px)";

},220);

}

updatePhoto();

/* NEXT */

document.getElementById(
"nextBtn"
).addEventListener(
"click",()=>{

currentPhoto++;

if(currentPhoto >= photos.length){

currentPhoto = 0;

}

updatePhoto();

});

/* PREV */

document.getElementById(
"prevBtn"
).addEventListener(
"click",()=>{

currentPhoto--;

if(currentPhoto < 0){

currentPhoto =
photos.length - 1;

}

updatePhoto();

});

/* OVERLAY */

document.getElementById(
"album"
).addEventListener(
"click",()=>{

document.getElementById(
"album"
).classList.toggle(
"active"
);

});

/* AUDIO */

const audio =
document.getElementById(
"audio"
);

audio.load();

const playBtn =
document.getElementById(
"playBtn"
);

const fill =
document.getElementById(
"fill"
);

const current =
document.getElementById(
"current"
);

const duration =
document.getElementById(
"duration"
);

let playing = false;

playBtn.addEventListener(
"click",async()=>{

if(audio.paused){

try{

await audio.play();

playBtn.innerHTML = "❚❚";

playing = true;

}catch(err){

console.log(err);

}

}else{

audio.pause();

playBtn.innerHTML = "▶";

playing = false;

}

});

/* DURATION */

audio.addEventListener(
"loadedmetadata",()=>{

duration.innerHTML =
formatTime(
audio.duration
);

});

/* UPDATE */

audio.addEventListener(
"timeupdate",()=>{

const progress =
(audio.currentTime /
audio.duration) * 100;

fill.style.width =
progress + "%";

current.innerHTML =
formatTime(
audio.currentTime
);

});

/* SEEK */

document.querySelector(
".bar"
).addEventListener(
"click",(e)=>{

const width =
e.currentTarget.clientWidth;

const clickX =
e.offsetX;

audio.currentTime =
(clickX / width)
* audio.duration;

});

/* FORMAT */

function formatTime(time){

let minutes =
Math.floor(time / 60);

let seconds =
Math.floor(time % 60);

if(seconds < 10){

seconds =
"0" + seconds;

}

return minutes +
":" + seconds;

}

/* LYRICS */

const showLyrics =
document.getElementById(
"showLyrics"
);

const fullLyrics =
document.getElementById(
"fullLyrics"
);

const lyricBox =
document.getElementById(
"lyricBox"
);

const closeLyrics =
document.getElementById(
"closeLyrics"
);

showLyrics.addEventListener(
"click",()=>{

fullLyrics.classList.add(
"show"
);

lyricBox.innerHTML = "";

const lines =
FULL_LYRICS
.trim()
.split("\n");

lines.forEach(
(line,index)=>{

setTimeout(()=>{

const div =
document.createElement(
"div"
);

div.classList.add(
"lyric-line"
);

div.innerHTML = line;

lyricBox.appendChild(
div
);

lyricBox.scrollTop =
lyricBox.scrollHeight;

},index * 2000);

});

});

closeLyrics.addEventListener(
"click",()=>{

fullLyrics.classList.remove(
"show"
);

});

</script>

</body>
</html>
