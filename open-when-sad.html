.particle{

.home{

/* ================= SHUFFLE ================= */

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

/* ================= STATE ================= */

let deck;
try {
    deck = JSON.parse(localStorage.getItem("deck"));
} catch (e) {
    deck = null;
}

    deck = shuffle(MESSAGES);
}

let opened = Number(localStorage.getItem("sadCounter"));
if (isNaN(opened)) opened = 0;

/* ================= INIT ================= */

window.addEventListener("DOMContentLoaded", () => {

    const msgEl = document.getElementById("message");
    const counterEl = document.getElementById("counter");

    counterEl.innerText = "Messages Opened : " + opened;

    window.generateMessage = function () {

        if (deck.length === 0) {
            alert("Semua pesan telah dibaca.\nMengacak ulang...");
            deck = shuffle(MESSAGES);
        }

        const msg = deck.pop();

        localStorage.setItem("deck", JSON.stringify(deck));

        msgEl.innerText = msg;

        opened++;
        localStorage.setItem("sadCounter", opened);

        counterEl.innerText = "Messages Opened : " + opened;
    };

    generateMessage();
});
